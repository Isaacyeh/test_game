<!DOCTYPE html>
<html>
  <head>
    <title>Web Doom-like</title>
 
    <!--
      This <style> block is the very first thing the browser parses.
      It hides the body before ANY script or stylesheet loads, which
      prevents the flash of unstyled / un-rendered content.
      loader.js will remove the `loading` class once the overlay is gone.
    -->
    <style>
      body.loading > *:not(#game-loader) {
        visibility: hidden;
      }
    </style>
 
    <!--
      loader.js runs synchronously (no defer/async) so it executes
      immediately during HTML parsing, before the browser paints anything.
      It adds the `loading` class to <body> and injects the overlay.
    -->
    <script src="loader.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="loading">
    <span>
      <div id="menu-button" onmouseover="rotate()" onmouseout="unrotate()">
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
      </div>
      <div class="title">
        <h1>PROJECT ALPHA</h1>
      </div>
 
      <div id="menu" class="menu hidden">
        <ul>
          <li><a href="#" id="customizationMenuLink">Customization</a></li>
          <li><a href="#" id="keybindsMenuLink">Keybinds</a></li>
          <li><a href="#">TBD</a></li>
          <li><a href="#" id="settingsMenuLink">Settings</a></li>
        </ul>
      </div>
    </span>
 
    <script src="UI/menu.js"></script>
 
    <canvas id="game" width="800" height="500"></canvas>
 
    <div id="spriteMenu" class="sprite-menu hidden">
      <!-- Populated by spriteMenu.js -->
    </div>
 
    <!-- Crosshair customization overlay -->
    <div id="customizationOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-window">
        <button id="closeCustomization" type="button" class="overlay-close" aria-label="Close">✕</button>
        <h2>Crosshair Customization</h2>
        <div class="field-group">
          <label for="crosshairImageInput">Upload crosshair image / GIF</label>
          <input id="crosshairImageInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml" />
        </div>
        <div class="field-group">
          <label for="crosshairOpacityInput">Crosshair opacity</label>
          <input id="crosshairOpacityInput" type="range" min="0.1" max="1" step="0.05" value="1" />
        </div>
        <button id="confirmCustomization" type="button" class="confirm-button">Confirm</button>
      </div>
    </div>

    <!-- Keybinds overlay -->
    <div id="keybindsOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-window kb-window">
        <button id="closeKeybinds" type="button" class="overlay-close" aria-label="Close">✕</button>
        <h2>Keybinds</h2>
        <p class="overlay-subtitle">Click a binding to reassign it</p>
        <div class="kb-list" id="kbList"></div>
        <button class="kb-reset-btn" id="kbReset">Reset to defaults</button>
        <button class="kb-save-btn" id="kbSave">Save keybind to localStorage</button>
      </div>
    </div>
 
    <!-- Settings overlay (debug toggles) -->
    <div id="settingsOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-window">
        <button id="closeSettings" type="button" class="overlay-close" aria-label="Close">✕</button>
        <h2>Settings</h2>
        <p class="overlay-subtitle">Debug toggles — output appears in the chat panel</p>
 
        <div class="toggle-row">
          <span class="toggle-label">Player movement logs</span>
          <label class="toggle-switch">
            <input type="checkbox" data-debug-key="playerMovement" />
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Projectile fire logs</span>
          <label class="toggle-switch">
            <input type="checkbox" data-debug-key="projectileFire" />
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Network send logs</span>
          <label class="toggle-switch">
            <input type="checkbox" data-debug-key="networkSend" />
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Hit detection logs</span>
          <label class="toggle-switch">
            <input type="checkbox" data-debug-key="hitDetection" />
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Spawn invincibility logs</span>
          <label class="toggle-switch">
            <input type="checkbox" data-debug-key="spawnInvincible" />
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>
    </div>
 
    <div id="chatContainer">
      <div id="chat"></div>
      <input id="chatInput" placeholder="Type message..." />
      <button id="sendBtn">Send</button>
    </div>
 
    <script type="module" src="script.js"></script>
  </body>
</html>
