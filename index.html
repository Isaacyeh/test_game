<!DOCTYPE html>
<html>
  <head>
    <title>Web Doom-like</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <span>
      <div id="menu-button" onmouseover="rotate()" onmouseout="unrotate()">
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
      </div>
      <div class="title">
        <h1>PROJECT ALPHA</h1>
      </div>

      <div id="menu" class="menu hidden">
        <ul>
          <li><a href="#" id="customizationMenuLink">Customization</a></li>
          <li><a href="#">TBD</a></li>
          <li><a href="#">TBD</a></li>
          <li><a href="#">TBD</a></li>
        </ul>
      </div>
    </span>

    <script src="UI/menu.js"></script>

    <canvas id="game" width="800" height="500"></canvas>

    <div id="spriteMenu" class="sprite-menu hidden">
      <!-- Menu content will be populated by JS -->
    </div>
      
    <div id="customizationOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-window">
        <button id="closeCustomization" type="button" class="overlay-close" aria-label="Close customization window">✕</button>
        <h2>Crosshair Customization</h2>
        <div class="field-group">
          <label for="crosshairImageInput">Upload crosshair image</label>
          <input id="crosshairImageInput" type="file" accept="image/*,.gif" />
        </div>
        <div class="field-group">
          <label for="crosshairOpacityInput">Crosshair opacity</label>
          <input id="crosshairOpacityInput" type="range" min="0.1" max="1" step="0.05" value="1" />
        </div>
        <button id="confirmCustomization" type="button" class="confirm-button">Confirm</button>
      </div>
    </div>

    <div id="chatContainer">
      <div id="chat"></div>
      <input id="chatInput" placeholder="Type message..." />
      <button id="sendBtn">Send</button>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
